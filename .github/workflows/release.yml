name: Python Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  discussions: write

env:
  WEBDAV_URL: ${{ secrets.WEBDAV_URL }}
  WEBDAV_USERNAME: ${{ secrets.WEBDAV_USERNAME }}
  WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}

jobs:
  prepare-release:
    name: Prepare GitHub Prerelease
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Create or update prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          if gh release view "$DRAFT_TAG" >/dev/null 2>&1; then
            echo "Release $DRAFT_TAG already exists, mark it as prerelease"
            gh release edit "$DRAFT_TAG" --prerelease --latest=false
          else
            echo "Create prerelease $DRAFT_TAG"
            gh release create "$DRAFT_TAG" \
              --title "$DRAFT_TAG" \
              --notes "Prerelease build for $DRAFT_TAG" \
              --prerelease \
              --latest=false
          fi

  build:
    name: Build Executables
    needs: prepare-release
    runs-on: ${{ matrix.config.os.name }}
    if: startsWith(github.ref, 'refs/tags/v')

    strategy:
      fail-fast: false
      matrix:
        config:
          - os:
              name: ubuntu-22.04
              filename: linux_amd64
          - os:
              name: ubuntu-22.04-arm
              filename: linux_arm64
          - os:
              name: macos-14
              filename: macos_arm64
          - os:
              name: macos-15-intel
              filename: macos_intel
          - os:
              name: windows-latest
              filename: windows_amd64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: "pip"

      - name: Upgrade setuptools, wheel, and install requirements
        shell: bash
        run: |
          pip install --upgrade setuptools wheel pyinstaller~=5.13.2
          pip install -r requirements.txt

      - name: Build Pyinstaller
        shell: bash
        run: |
          pyinstaller main.spec

      - name: Zip the Build-windows
        if: matrix.config.os.filename == 'windows_amd64'
        shell: pwsh
        run: |
          Compress-Archive -Path ./dist/biliTicKerBuy.exe -DestinationPath tmp.zip -Force

      - name: Zip the Build-linux-macos
        if: matrix.config.os.filename != 'windows_amd64'
        shell: bash
        run: |
          cd ./dist
          zip -r ../tmp.zip biliTickerBuy

      - name: Upload binaries to prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT_TAG: ${{ github.ref_name }}
          RELEASE_ZIP_NAME: ${{ secrets.ReleaseZipName }}
          PLATFORM: ${{ matrix.config.os.filename }}
        shell: bash
        run: |
          ASSET_NAME="${RELEASE_ZIP_NAME}_${PLATFORM}_${DRAFT_TAG}.zip"

          echo "Rename tmp.zip -> ${ASSET_NAME}"
          mv tmp.zip "${ASSET_NAME}"

          echo "Upload ${ASSET_NAME} to release ${DRAFT_TAG}"
          gh release upload "${DRAFT_TAG}" "${ASSET_NAME}" --clobber

      - name: Ensure release is prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          gh release edit "$DRAFT_TAG" --prerelease --latest=false

  webdav-upload:
    name: Upload to WebDAV
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download release files
        shell: bash
        run: |
          mkdir -p release-files

          ARCHITECTURES=("linux_amd64" "linux_arm64" "macos_arm64" "macos_intel" "windows_amd64")

          for arch in "${ARCHITECTURES[@]}"; do
            FILE_NAME="${{ secrets.ReleaseZipName }}_${arch}_${{ steps.version.outputs.version }}.zip"
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/${FILE_NAME}"

            for i in {1..10}; do
              if curl -L -f -o "release-files/${FILE_NAME}" "$DOWNLOAD_URL"; then
                echo "Downloaded ${FILE_NAME}"
                break
              else
                echo "Download failed for ${FILE_NAME}, retry $i..."
                sleep 10
              fi

              if [ "$i" -eq 10 ]; then
                echo "Failed to download ${FILE_NAME}"
                exit 1
              fi
            done
          done

      - name: Generate version info
        shell: bash
        run: |
          cat > release-files/version-info.json << EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "release_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "github_release": "https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}",
            "prerelease": true,
            "files": {
              "linux_amd64": "${{ secrets.ReleaseZipName }}_linux_amd64_${{ steps.version.outputs.version }}.zip",
              "linux_arm64": "${{ secrets.ReleaseZipName }}_linux_arm64_${{ steps.version.outputs.version }}.zip",
              "macos_arm64": "${{ secrets.ReleaseZipName }}_macos_arm64_${{ steps.version.outputs.version }}.zip",
              "macos_intel": "${{ secrets.ReleaseZipName }}_macos_intel_${{ steps.version.outputs.version }}.zip",
              "windows_amd64": "${{ secrets.ReleaseZipName }}_windows_amd64_${{ steps.version.outputs.version }}.zip"
            }
          }
          EOF

      - name: Upload to WebDAV
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

          WEBDAV_DIR="releases/${{ steps.version.outputs.version }}"

          curl -X MKCOL \
            -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
            "$WEBDAV_URL/releases/" || true

          curl -X MKCOL \
            -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
            "$WEBDAV_URL/$WEBDAV_DIR/" || true

          cd release-files

          for file in *.zip; do
            if [ -f "$file" ]; then
              echo "Uploading $file to releases directory..."
              curl -T "$file" \
                -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
                "$WEBDAV_URL/$WEBDAV_DIR/$file"
            fi
          done

          curl -T "version-info.json" \
            -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
            "$WEBDAV_URL/$WEBDAV_DIR/version-info.json"

          echo "Uploading latest versions to root directory..."

          for file in *.zip; do
            if [ -f "$file" ]; then
              echo "Uploading $file to root..."
              curl -T "$file" \
                -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
                "$WEBDAV_URL/$file"
            fi
          done

          curl -T "version-info.json" \
            -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
            "$WEBDAV_URL/version-info.json"

          echo "WebDAV upload completed"
