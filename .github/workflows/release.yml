name: Python Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  discussions: write

env:
  WEBDAV_URL: ${{ secrets.WEBDAV_URL }}
  WEBDAV_USERNAME: ${{ secrets.WEBDAV_USERNAME }}
  WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}

jobs:
  build:
    name: Build Executables
    runs-on: ${{ matrix.config.os.name }}
    strategy:
      matrix:
        config:
          - os:
              name: ubuntu-22.04
              filename: linux_amd64
          - os:
              name: ubuntu-22.04-arm
              filename: linux_arm64
          - os:
              name: macos-14
              filename: macos_arm64
          - os:
              name: macos-15-intel
              filename: macos_intel
          - os:
              name: windows-latest
              filename: windows_amd64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: "pip"

      - name: Upgrade setuptools, wheel, and install requirements
        run: |
          pip install --upgrade setuptools wheel pyinstaller~=5.13.2
          pip install -r requirements.txt

      - name: Build Pyinstaller
        shell: bash
        run: |
          pyinstaller main.spec

      - name: Zip the Build-windows
        if: matrix.config.os.filename == 'windows_amd64'
        shell: pwsh
        run: |
          Compress-Archive -Path ./dist/biliTicKerBuy.exe -DestinationPath tmp.zip -Force

      - name: Zip the Build-linux-macos
        if: matrix.config.os.filename != 'windows_amd64'
        shell: bash
        run: |
          cd ./dist
          zip -r ../tmp.zip biliTickerBuy

      - name: Upload binaries to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: svenstaro/upload-release-action@v2
        with:
          file: tmp.zip
          asset_name: ${{ secrets.ReleaseZipName }}_${{ matrix.config.os.filename }}_${{ github.ref_name }}.zip
          tag: ${{ github.ref_name }}
          overwrite: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Mark release as prerelease
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release edit "${{ github.ref_name }}" --prerelease

  webdav-upload:
    name: Upload to WebDAV
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download release files
        shell: bash
        run: |
          mkdir -p release-files

          # Wait for GitHub Release assets to become available
          sleep 30

          ARCHITECTURES=("linux_amd64" "linux_arm64" "macos_arm64" "macos_intel" "windows_amd64")

          for arch in "${ARCHITECTURES[@]}"; do
            FILE_NAME="${{ secrets.ReleaseZipName }}_${arch}_${{ steps.version.outputs.version }}.zip"
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/${FILE_NAME}"

            for i in {1..5}; do
              if curl -L -f -o "release-files/${FILE_NAME}" "$DOWNLOAD_URL"; then
                echo "Downloaded ${FILE_NAME}"
                break
              else
                echo "Download failed for ${FILE_NAME}, retry $i..."
                sleep 10
              fi
            done
          done

      - name: Generate checksums and version info
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_ZIP_NAME: ${{ secrets.ReleaseZipName }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          for arch in linux_amd64 linux_arm64 macos_arm64 macos_intel windows_amd64; do
            test -f "release-files/${RELEASE_ZIP_NAME}_${arch}_${RELEASE_VERSION}.zip"
          done

          cd release-files
          sha256sum ./*.zip > SHA256SUMS.txt
          python - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          prefix = os.environ["RELEASE_ZIP_NAME"]
          repository = os.environ["RELEASE_REPOSITORY"]
          platforms = (
              "linux_amd64",
              "linux_arm64",
              "macos_arm64",
              "macos_intel",
              "windows_amd64",
          )
          files = {}
          for platform_name in platforms:
              path = Path(f"{prefix}_{platform_name}_{version}.zip")
              files[platform_name] = {
                  "name": path.name,
                  "size": path.stat().st_size,
                  "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
              }

          manifest = {
              "version": version,
              "release_date": datetime.now(timezone.utc).isoformat(),
              "github_release": f"https://github.com/{repository}/releases/tag/{version}",
              "files": files,
          }
          Path("version-info.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload checksum manifest to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.version }}" \
            release-files/version-info.json \
            release-files/SHA256SUMS.txt \
            --clobber

      - name: Upload to WebDAV
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

          WEBDAV_DIR="releases/${{ steps.version.outputs.version }}"

          curl -X MKCOL \
            -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
            "$WEBDAV_URL/releases/" || true

          curl -X MKCOL \
            -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
            "$WEBDAV_URL/$WEBDAV_DIR/" || true

          cd release-files

          for file in *.zip; do
            if [ -f "$file" ]; then
              echo "Uploading $file to releases directory..."
              curl -T "$file" \
                -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
                "$WEBDAV_URL/$WEBDAV_DIR/$file"
            fi
          done

          curl -T "version-info.json" \
            -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
            "$WEBDAV_URL/$WEBDAV_DIR/version-info.json"

          echo "Uploading latest versions to root directory..."

          for file in *.zip; do
            if [ -f "$file" ]; then
              echo "Uploading $file to root..."
              curl -T "$file" \
                -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
                "$WEBDAV_URL/$file"
            fi
          done

          curl -T "version-info.json" \
            -u "$WEBDAV_USERNAME:$WEBDAV_PASSWORD" \
            "$WEBDAV_URL/version-info.json"

          echo "WebDAV upload completed"
