name: Ruff Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff-check:
    name: Lint And Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run ruff lint
        run: uv tool run --from ruff==0.12.0 ruff check .

      - name: Run ruff format check
        run: uv tool run --from ruff==0.12.0 ruff format --check .
